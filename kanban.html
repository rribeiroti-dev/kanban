<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA KANBAN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400;1,500&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0A0B0E;
            --bg-secondary: #111318;
            --bg-tertiary: #1A1D24;
            --bg-elevated: #21252E;
            --border-subtle: #2A2D36;
            --border-active: #3D4255;
            --text-primary: #F0F2F5;
            --text-secondary: #8B90A0;
            --text-muted: #4A4F62;
            --accent-blue: #4A90D9;
            --accent-blue-glow: rgba(74,144,217,0.15);
            --accent-green: #27AE60;
            --accent-amber: #F5A623;
            --accent-red: #E74C3C;
            --accent-red-glow: rgba(231,76,60,0.12);
            
            --font-display: 'DM Mono', 'Fira Code', monospace;
            --font-body: 'Inter', 'SF Pro Text', sans-serif;
            
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 16px;
            
            --shadow-card: 0 2px 8px rgba(0,0,0,0.4);
            --shadow-elevated: 0 8px 32px rgba(0,0,0,0.6);
            
            --transition-fast: 150ms cubic-bezier(0.4,0,0.2,1);
            --transition-normal: 250ms cubic-bezier(0.4,0,0.2,1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-active); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* Typography */
        h1, h2, h3, .font-display { font-family: var(--font-display); }

        /* Layout & Views */
        .view {
            display: none;
            min-height: 100vh;
            width: 100%;
        }
        .view.active {
            display: flex;
            flex-direction: column;
        }

        /* Auth View */
        #auth-view {
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top right, var(--bg-tertiary), var(--bg-primary));
        }

        .auth-box {
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow-elevated);
            transform: scale(0.95);
            opacity: 0;
            animation: scaleIn 0.3s var(--transition-normal) forwards;
        }

        .brand {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 500;
            text-align: center;
            letter-spacing: 2px;
            margin-bottom: 2rem;
            color: var(--text-primary);
        }

        .logo-dot { color: var(--accent-blue); font-weight: bold; }

        .form-group { margin-bottom: 1.25rem; }
        .form-group label {
            display: block;
            font-family: var(--font-display);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        input, select, textarea {
            width: 100%;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-subtle);
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 0.875rem;
            padding: 0.75rem 1rem;
            border-radius: var(--radius-sm);
            transition: all var(--transition-fast);
            outline: none;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 2px var(--accent-blue-glow);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            background: var(--accent-blue);
            color: #fff;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: var(--radius-sm);
            font-family: var(--font-display);
            font-size: 0.875rem;
            text-transform: uppercase;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        .btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }
        .btn.btn-outline {
            background: transparent;
            border: 1px solid var(--border-subtle);
            color: var(--text-secondary);
        }
        .btn.btn-outline:hover {
            border-color: var(--text-primary);
            color: var(--text-primary);
        }

        .toggle-auth {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
        .toggle-auth a {
            color: var(--accent-blue);
            text-decoration: none;
            cursor: pointer;
            transition: color var(--transition-fast);
        }
        .toggle-auth a:hover { color: #fff; }

        /* App View */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.25rem 2rem;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-subtle);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .avatar {
            width: 36px;
            height: 36px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-active);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-display);
            font-size: 0.875rem;
            color: var(--accent-blue);
        }

        .app-content {
            padding: 2rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        /* Dashboard */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
        }

        .dash-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            padding: 1.5rem;
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            box-shadow: var(--shadow-card);
            transition: all var(--transition-normal);
            opacity: 0;
        }
        .dash-card:hover {
            transform: translateY(-4px);
            border-color: var(--border-active);
            box-shadow: var(--shadow-elevated);
        }

        .dash-icon {
            padding: 0.75rem;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .dash-info h3 {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.25rem;
        }
        .dash-info .dash-value {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 500;
            color: var(--text-primary);
            line-height: 1;
        }

        /* Kanban Board */
        .kanban-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            align-items: start;
            flex: 1;
        }

        .kanban-column {
            background: var(--bg-tertiary);
            border-radius: var(--radius-lg);
            display: flex;
            flex-direction: column;
            max-height: calc(100vh - 250px);
            opacity: 0;
        }
        
        .kanban-column.drag-over {
            border: 2px dashed var(--accent-blue);
            background: var(--accent-blue-glow);
            transform: scale(1.01);
            transition: all var(--transition-fast);
        }

        .col-header {
            padding: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-subtle);
        }

        .col-title {
            font-family: var(--font-display);
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .col-count {
            background: var(--bg-secondary);
            border: 1px solid var(--border-active);
            color: var(--text-secondary);
            padding: 0.1rem 0.5rem;
            border-radius: 99px;
            font-size: 0.75rem;
        }

        .col-body {
            padding: 1rem;
            overflow-y: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            min-height: 150px;
        }

        .btn-add-task {
            background: transparent;
            border: 1px dashed var(--border-subtle);
            color: var(--text-secondary);
            padding: 0.75rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            margin-top: 0.5rem;
        }
        .btn-add-task:hover {
            border-color: var(--accent-blue);
            color: var(--accent-blue);
            background: var(--accent-blue-glow);
        }

        /* Task Card */
        .task-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            padding: 1rem;
            cursor: grab;
            box-shadow: var(--shadow-card);
            position: relative;
            transition: transform var(--transition-fast), border-color var(--transition-fast);
        }
        .task-card:active { cursor: grabbing; opacity: 0.6; }
        .task-card:hover { transform: translateY(-2px); border-color: var(--border-active); }
        .task-card:hover .task-actions { opacity: 1; pointer-events: auto; }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.5rem;
            gap: 1rem;
        }

        .task-title {
            font-weight: 500;
            font-size: 0.95rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .task-desc {
            font-size: 0.8rem;
            color: var(--text-secondary);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 1rem;
        }

        .task-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .task-badges {
            display: flex;
            gap: 0.5rem;
        }

        .badge {
            font-family: var(--font-display);
            font-size: 0.65rem;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            border: 1px solid var(--border-subtle);
        }

        .badge.status-todo { color: var(--accent-blue); border-color: var(--accent-blue-glow); }
        .badge.status-doing { color: var(--accent-amber); border-color: rgba(245,166,35,0.2); }
        .badge.status-done { color: var(--accent-green); border-color: rgba(39,174,96,0.2); }

        .task-actions {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            display: flex;
            gap: 0.25rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition-fast);
            background: var(--bg-secondary);
            padding: 0.25rem;
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-card);
        }

        .action-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 0.25rem;
            border-radius: 4px;
        }
        .action-btn:hover { background: var(--bg-tertiary); color: var(--text-primary); }
        .action-btn.delete:hover { color: var(--accent-red); }

        /* Task States */
        .task-card.completed {
            opacity: 0.6;
        }
        .task-card.completed .task-title {
            text-decoration: line-through;
            color: var(--text-secondary);
        }
        .check-btn {
            background: none;
            border: 1px solid var(--border-subtle);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: transparent;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .task-card.completed .check-btn {
            background: var(--accent-green);
            border-color: var(--accent-green);
            color: #fff;
        }
        
        .task-card.overdue {
            border-left: 3px solid var(--accent-red);
            background: linear-gradient(90deg, var(--accent-red-glow) 0%, var(--bg-secondary) 100%);
        }
        .badge.overdue-badge {
            color: var(--accent-red);
            border-color: var(--accent-red);
            animation: pulse 2s infinite;
        }

        /* Modals */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 11, 14, 0.8);
            backdrop-filter: blur(8px) brightness(0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition-fast);
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: var(--bg-elevated);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 500px;
            padding: 2rem;
            transform: scale(0.95);
            transition: transform var(--transition-fast);
            box-shadow: var(--shadow-elevated);
        }
        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .modal-title { font-family: var(--font-display); }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.5rem;
            line-height: 1;
        }
        .modal-close:hover { color: var(--text-primary); }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 2rem;
        }

        .toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            z-index: 100;
        }
        .toast {
            background: var(--bg-elevated);
            border-left: 3px solid var(--accent-blue);
            color: var(--text-primary);
            padding: 1rem 1.5rem;
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-elevated);
            animation: fadeSlideIn 0.3s forwards;
            font-size: 0.875rem;
        }
        .toast.error { border-color: var(--accent-red); }

        /* Animations */
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(231,76,60,0.4); }
            70% { box-shadow: 0 0 0 6px rgba(231,76,60,0); }
            100% { box-shadow: 0 0 0 0 rgba(231,76,60,0); }
        }

        /* Utilities */
        .icon-sm { width: 16px; height: 16px; }
        .icon-md { width: 20px; height: 20px; }
        .icon-lg { width: 24px; height: 24px; }
        .text-error { color: var(--accent-red); font-size: 0.75rem; margin-top: 0.25rem; display: none; }

        /* Media Queries for Responsiveness */
        @media (max-width: 768px) {
            .kanban-board {
                display: flex;
                flex-direction: column;
                padding-bottom: 1rem;
            }
            .kanban-column {
                width: 100%;
                max-height: none;
            }
            .app-content { padding: 1rem; }
            .dashboard { grid-template-columns: repeat(2, 1fr); }
            .dash-info h3 { font-size: 0.65rem; }
            .dash-info .dash-value { font-size: 1.5rem; }
        }
        
        .user-clickable {
            cursor: pointer;
            border-radius: var(--radius-sm);
            padding: 0.25rem 0.5rem;
            transition: background var(--transition-fast);
        }
        .user-clickable:hover { background: var(--bg-tertiary); }
    </style>
</head>
<body>

    <!-- ==================== AUTH VIEW ==================== -->
    <div id="auth-view" class="view active">
        <div class="auth-box">
            <div class="brand"><span class="logo-dot">.</span> KANBAN</div>
            
            <!-- Login -->
            <form id="form-login">
                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" id="login-email" required placeholder="seu@email.com">
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="login-password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn">Entrar</button>
                <div class="toggle-auth">
                    Não tem conta? <a id="btn-show-register">Registre-se</a>
                </div>
            </form>

            <!-- Register -->
            <form id="form-register" style="display: none;">
                <div class="form-group">
                    <label>Nome</label>
                    <input type="text" id="reg-name" required placeholder="Seu nome">
                </div>
                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" id="reg-email" required placeholder="seu@email.com">
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="reg-password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn">Criar Conta</button>
                <div class="toggle-auth">
                    Já possui conta? <a id="btn-show-login">Faça Login</a>
                </div>
            </form>
        </div>
    </div>

    <!-- ==================== APP VIEW ==================== -->
    <div id="app-view" class="view">
        <header class="app-header">
            <div class="brand" style="margin-bottom:0;"><span class="logo-dot">.</span> KANBAN</div>
            <div class="user-menu">
                <div class="user-clickable" style="display:flex;align-items:center;gap:1rem;" onclick="UI.openUserModal()">
                    <div class="avatar" id="user-avatar">US</div>
                    <span id="user-name" class="font-display" style="font-size:0.875rem;">Usuario</span>
                </div>
                <button class="action-btn" title="Auditoria" onclick="UI.openAuditModal()">
                    <svg class="icon-md" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                </button>
                <button id="btn-logout" class="action-btn" title="Sair">
                    <svg class="icon-md" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                </button>
            </div>
        </header>

        <main class="app-content">
            <!-- Dashboard -->
            <section class="dashboard" id="dashboard-container">
                <div class="dash-card" style="animation: fadeSlideUp 0.4s 0ms forwards;">
                    <div class="dash-icon" style="background: var(--accent-blue-glow); color: var(--accent-blue);">
                        <svg class="icon-lg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    </div>
                    <div class="dash-info">
                        <h3>Tarefas Totais</h3>
                        <div class="dash-value" id="metric-total">0</div>
                    </div>
                </div>
                <div class="dash-card" style="animation: fadeSlideUp 0.4s 80ms forwards;">
                    <div class="dash-icon" style="background: rgba(245,166,35,0.15); color: var(--accent-amber);">
                        <svg class="icon-lg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
                    </div>
                    <div class="dash-info">
                        <h3>Em Execução</h3>
                        <div class="dash-value" id="metric-doing">0</div>
                    </div>
                </div>
                <div class="dash-card" style="animation: fadeSlideUp 0.4s 160ms forwards;">
                    <div class="dash-icon" style="background: rgba(39,174,96,0.15); color: var(--accent-green);">
                        <svg class="icon-lg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                    </div>
                    <div class="dash-info">
                        <h3>Concluídas</h3>
                        <div class="dash-value" id="metric-done">0</div>
                    </div>
                </div>
                <div class="dash-card" style="animation: fadeSlideUp 0.4s 240ms forwards;">
                    <div class="dash-icon" style="background: var(--accent-red-glow); color: var(--accent-red);">
                        <svg class="icon-lg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                    </div>
                    <div class="dash-info">
                        <h3>Em Atraso</h3>
                        <div class="dash-value" id="metric-overdue">0</div>
                    </div>
                </div>
            </section>

            <!-- Kanban -->
            <section class="kanban-board">
                <!-- TODO Column -->
                <div class="kanban-column" data-status="todo" style="animation: fadeSlideIn 0.4s 0ms forwards;">
                    <div class="col-header">
                        <div class="col-title"><div style="width:8px;height:8px;border-radius:50%;background:var(--accent-blue);"></div> A Fazer</div>
                        <span class="col-count" id="count-todo">0</span>
                    </div>
                    <div class="col-body" id="col-todo">
                        <!-- Cards injetados via JS -->
                    </div>
                    <div style="padding: 0 1rem 1rem;">
                        <button class="btn-add-task w-100" onclick="UI.openTaskModal('todo')">
                            <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                            Nova Tarefa
                        </button>
                    </div>
                </div>

                <!-- DOING Column -->
                <div class="kanban-column" data-status="doing" style="animation: fadeSlideIn 0.4s 100ms forwards;">
                    <div class="col-header">
                        <div class="col-title"><div style="width:8px;height:8px;border-radius:50%;background:var(--accent-amber);"></div> Fazendo</div>
                        <span class="col-count" id="count-doing">0</span>
                    </div>
                    <div class="col-body" id="col-doing"></div>
                    <div style="padding: 0 1rem 1rem;">
                        <button class="btn-add-task w-100" onclick="UI.openTaskModal('doing')">
                            <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                            Nova Tarefa
                        </button>
                    </div>

                <!-- DONE Column -->
                <div class="kanban-column" data-status="done" style="animation: fadeSlideIn 0.4s 200ms forwards;">
                    <div class="col-header">
                        <div class="col-title"><div style="width:8px;height:8px;border-radius:50%;background:var(--accent-green);"></div> Concluído</div>
                        <span class="col-count" id="count-done">0</span>
                    </div>
                    <div class="col-body" id="col-done"></div>
                    <div style="padding: 0 1rem 1rem;">
                        <button class="btn-add-task w-100" onclick="UI.openTaskModal('done')">
                            <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                            Nova Tarefa
                        </button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- ==================== MODALS ==================== -->
    <div class="modal-overlay" id="task-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modal-task-title">Nova Tarefa</h2>

    <!-- Confirm Delete Modal -->
    <div class="modal-overlay" id="confirm-modal">
        <div class="modal-content" style="max-width: 400px; text-align: center; padding: 2.5rem;">
            <div style="color: var(--accent-red); margin-bottom: 1rem;">
                <svg class="icon-lg" style="width:48px;height:48px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
            </div>
            <h2 class="modal-title" style="margin-bottom:0.5rem;">Excluir tarefa?</h2>
            <p style="color:var(--text-secondary);font-size:0.875rem;margin-bottom:2rem;">Esta ação não pode ser desfeita.</p>
            <div style="display:flex;gap:1rem;justify-content:center;">
                <button class="btn btn-outline" onclick="UI.closeModals()">Cancelar</button>
                <button class="btn" style="background:var(--accent-red);" id="btn-confirm-delete">Excluir</button>
            </div>

    <!-- User Edit Modal -->
    <div class="modal-overlay" id="user-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Editar Perfil</h2>
                <button class="modal-close" onclick="UI.closeModals()">&times;</button>
            </div>
            <form id="form-user-edit">
                <div class="form-group">
                    <label>Nome</label>
                    <input type="text" id="edit-user-name" required>
                </div>
                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" id="edit-user-email" required>
                </div>
                <div class="form-group">
                    <label>Nova Senha (opcional)</label>
                    <input type="password" id="edit-user-password" placeholder="••••••••">

                    <button type="button" class="btn btn-outline" onclick="UI.closeModals()" style="width:auto;">Cancelar</button>
                    <button type="submit" class="btn" style="width:auto;">Salvar Alterações</button>

    <!-- Audit Modal -->
    <div class="modal-overlay" id="audit-modal">
        <div class="modal-content" style="max-width: 700px; max-height: 90vh; overflow-y: auto;">
            <div class="modal-header">
                <h2 class="modal-title">Auditoria</h2>
                <button class="modal-close" onclick="UI.closeModals()">&times;</button>
            </div>
            <div id="audit-content">
                <!-- Injetado via JS -->
            </div>
            <div class="modal-actions">
                <button class="btn" onclick="UI.closeModals()" style="width:100%;">Fechar</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <!-- ==================== JAVASCRIPT LOGIC ==================== -->
    <script>
        // --- 1. STORAGE ABSTRACTION ---
        const Storage = {
            get(key) { return JSON.parse(localStorage.getItem(key) || 'null'); },
            set(key, value) { localStorage.setItem(key, JSON.stringify(value)); },
            remove(key) { localStorage.removeItem(key); }
        };

        // --- 2. CRYPTO UTILS ---
        const CryptoUtils = {
            decodeJWT(token) {
                try {
                    return JSON.parse(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
                } catch { return null; }
            }
        };

        // --- 3. API CLIENT (Backend Real) ---
        const API = {
            async fetch(path, options = {}) {
                const headers = options.headers || { 'Content-Type': 'application/json' };
                const token = Storage.get('kanban_token');
                if (token) headers.Authorization = `Bearer ${token}`;
                
                try {
                    const res = await fetch(path, {
                        method: options.method || 'GET',
                        headers,
                        body: options.body
                    });
                    
                    const contentType = res.headers.get("content-type");
                    let data;
                    if (contentType && contentType.indexOf("application/json") !== -1) {
                        data = await res.json();
                    } else {
                        data = await res.text();
                    }

                    if (!res.ok) throw { status: res.status, message: data.message || "Erro na requisição" };
                    return data;
                } catch (err) {
                    if (err.status === 401 || err.status === 403) App.logout(err.message);
                    throw err;
                }
            }
        };

        // --- 4. STATE & UI MANAGEMENT ---
        const AppState = {
            user: null,
            tasks: [],
            draggedTaskId: null,
            taskToDelete: null
        };

        const Toast = {
            show(msg, type='info') {
                const cont = document.getElementById('toast-container');
                const t = document.createElement('div');
                t.className = `toast ${type}`;
                t.textContent = msg;
                cont.appendChild(t);
                setTimeout(() => { t.style.opacity = '0'; t.style.transform='translateY(10px)'; t.style.transition='all 0.3s'; setTimeout(()=>t.remove(),300); }, 3000);
            }
        };

        const Router = {
            showAuth() {
                document.getElementById('app-view').classList.remove('active');
                document.getElementById('auth-view').classList.add('active');
            },
            showApp() {
                document.getElementById('auth-view').classList.remove('active');
                document.getElementById('app-view').classList.add('active');
            }
        };

        const Helpers = {
            isOverdue(deadlineStr, completed) {
                if (completed || !deadlineStr) return false;
                const deadline = new Date(deadlineStr);
                return deadline < new Date();
            },
            formatDate(isoStr) {
                if (!isoStr) return '';
                const d = new Date(isoStr);
                const datePart = d.toLocaleDateString('pt-BR');
                const timePart = d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
                return `${datePart} ${timePart}`;
            },
            animateValue(el, start, end, duration) {
                let startTimestamp = null;
                const step = (timestamp) => {
                    if (!startTimestamp) startTimestamp = timestamp;
                    const p = Math.min((timestamp - startTimestamp) / duration, 1);
                    el.innerHTML = Math.floor(p * (end - start) + start);
                    if (p < 1) window.requestAnimationFrame(step);
                };
                window.requestAnimationFrame(step);
            }
        };

        const UI = {
            init() {
                // Modals
                document.getElementById('form-task').addEventListener('submit', TaskManager.saveTask);
                document.getElementById('form-user-edit').addEventListener('submit', AuthManager.saveUserEdit);
                document.getElementById('btn-confirm-delete').addEventListener('click', TaskManager.confirmDelete);
                
                // Auth Toggle
                document.getElementById('btn-show-register').addEventListener('click', () => {
                    document.getElementById('form-login').style.display = 'none';
                    document.getElementById('form-register').style.display = 'block';
                });
                document.getElementById('btn-show-login').addEventListener('click', () => {
                    document.getElementById('form-register').style.display = 'none';
                    document.getElementById('form-login').style.display = 'block';
                });

                // Drag & Drop
                document.querySelectorAll('.kanban-column').forEach(col => {
                    col.addEventListener('dragover', e => { e.preventDefault(); col.classList.add('drag-over'); });
                    col.addEventListener('dragleave', e => { col.classList.remove('drag-over'); });
                    col.addEventListener('drop', e => {
                        e.preventDefault();
                        col.classList.remove('drag-over');
                        const taskId = e.dataTransfer.getData('taskId');
                        const status = col.dataset.status;
                        if(taskId) TaskManager.moveTask(taskId, status);
                    });
                });
            },
            renderBoard() {
                const cols = { todo: [], doing: [], done: [] };
                AppState.tasks.forEach(t => { if(cols[t.status]) cols[t.status].push(t); });
                
                ['todo', 'doing', 'done'].forEach(status => {
                    const cont = document.getElementById(`col-${status}`);
                    document.getElementById(`count-${status}`).textContent = cols[status].length;
                    cont.innerHTML = cols[status].map(t => this.createTaskCardHTML(t)).join('');
                });
                
                this.renderDashboard();
            },
            createTaskCardHTML(t) {
                const isOverdue = Helpers.isOverdue(t.deadline, t.completed);
                const statusBadgeMap = {
                    todo: '<span class="badge status-todo">A FAZER</span>',
                    doing: '<span class="badge status-doing">FAZENDO</span>',
                    done: '<span class="badge status-done">CONCLUÍDO</span>'
                };
                return `
                    <div class="task-card ${t.completed ? 'completed' : ''} ${isOverdue ? 'overdue' : ''}" 
                         draggable="true" 
                         ondragstart="event.dataTransfer.setData('taskId', '${t.id}');"
                         id="task-${t.id}">
                        <div class="task-header">
                            <div class="check-btn" onclick="TaskManager.toggleComplete('${t.id}')">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" width="12" height="12"><polyline points="20 6 9 17 4 12"></polyline></svg>
                            </div>
                            <div class="task-title" style="flex:1" title="${t.title}">${t.title}</div>
                        </div>
                        ${t.description ? `<div class="task-desc">${t.description}</div>` : ''}
                        <div class="task-footer">
                            <div class="task-badges">
                                ${isOverdue ? '<span class="badge overdue-badge">ATRASADA</span>' : statusBadgeMap[t.status]}
                                <span class="badge" style="display:flex;align-items:center;gap:4px;">
                                    <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                                    ${Helpers.formatDate(t.deadline)}
                                </span>
                            </div>
                        </div>
                        <div class="task-actions">
                            <button class="action-btn" onclick="UI.openTaskModal(null, '${t.id}')">
                                <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                            </button>
                            <button class="action-btn delete" onclick="UI.openDeleteModal('${t.id}')">
                                <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                            </button>
                        </div>
                    </div>
                `;
            },
            renderDashboard() {
                const total = AppState.tasks.length;
                const doing = AppState.tasks.filter(t => t.status === 'doing').length;
                const done = AppState.tasks.filter(t => t.completed || t.status === 'done').length;
                const overdue = AppState.tasks.filter(t => Helpers.isOverdue(t.deadline, t.completed)).length;

                this.updateMetric('metric-total', total);
                this.updateMetric('metric-doing', doing);
                this.updateMetric('metric-done', done);
                this.updateMetric('metric-overdue', overdue);
            },
            updateMetric(id, newValue) {
                const el = document.getElementById(id);
                const current = parseInt(el.textContent) || 0;
                if(current !== newValue) Helpers.animateValue(el, current, newValue, 600);
            },
            openTaskModal(colStatus, taskId = null) {
                const m = document.getElementById('task-modal');
                const form = document.getElementById('form-task');
                form.reset();
                if(taskId) {
                    const task = AppState.tasks.find(t => t.id === taskId);
                    if(task) {
                        document.getElementById('modal-task-title').textContent = 'Editar Tarefa';
                        document.getElementById('task-id').value = task.id;
                        document.getElementById('task-title').value = task.title;
                        document.getElementById('task-desc').value = task.description;
                        document.getElementById('task-deadline').value = task.deadline;
                        document.getElementById('task-status').value = task.status;
                    }
                } else {
                    document.getElementById('modal-task-title').textContent = 'Nova Tarefa';
                    document.getElementById('task-id').value = '';
                    if(colStatus) document.getElementById('task-status').value = colStatus;
                }
                m.classList.add('active');
                setTimeout(() => document.getElementById('task-title').focus(), 50);
            },
            openUserModal() {
                document.getElementById('form-user-edit').reset();
                document.getElementById('edit-user-name').value = AppState.user.name;
                document.getElementById('edit-user-email').value = AppState.user.email;
                document.getElementById('user-modal').classList.add('active');
            },
            openAuditModal() {
                this.renderAuditContent();
                document.getElementById('audit-modal').classList.add('active');
            },
            async renderAuditContent() {
                const cont = document.getElementById('audit-content');
                cont.innerHTML = '<div style="text-align:center;padding:2rem;"><span class="badge">Carregando...</span></div>';
                try {
                    const userFull = await API.fetch('/api/users/me');
                    
                    let html = `<h3 style="margin-bottom:1rem;color:var(--text-secondary);font-family:var(--font-display);font-size:0.75rem;">CONTA</h3>`;
                    html += `<div style="background:var(--bg-tertiary);padding:1rem;border-radius:var(--radius-sm);margin-bottom:2rem;font-size:0.875rem;">`;
                    html += `<div><strong>Criada em:</strong> ${Helpers.formatDate(userFull.createdAt) || 'N/A'}</div>`;
                    html += `<div><strong>Última Edição:</strong> ${Helpers.formatDate(userFull.updatedAt) || 'N/A'}</div>`;
                    html += `<div><strong>Último Login:</strong> ${Helpers.formatDate(userFull.lastLoginAt) || 'N/A'}</div>`;
                    html += `</div>`;

                    html += `<h3 style="margin-bottom:1rem;color:var(--text-secondary);font-family:var(--font-display);font-size:0.75rem;">TAREFAS</h3>`;
                    html += `<div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;font-size:0.8rem;text-align:left;">`;
                    html += `<thead><tr style="border-bottom:1px solid var(--border-subtle);"><th style="padding:0.5rem;">Título</th><th style="padding:0.5rem;">Criada em</th><th style="padding:0.5rem;">Última Edição</th><th style="padding:0.5rem;">Concluída em</th></tr></thead><tbody>`;
                    
                    AppState.tasks.forEach(t => {
                        html += `<tr style="border-bottom:1px solid var(--border-subtle);">`;
                        html += `<td style="padding:0.5rem;max-width:150px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="${t.title}">${t.title}</td>`;
                        html += `<td style="padding:0.5rem;">${Helpers.formatDate(t.createdAt) || '-'}</td>`;
                        html += `<td style="padding:0.5rem;">${Helpers.formatDate(t.updatedAt) || '-'}</td>`;
                        html += `<td style="padding:0.5rem;">${t.completedAt ? Helpers.formatDate(t.completedAt) : '-'}</td>`;
                        html += `</tr>`;
                    });
                    
                    html += `</tbody></table></div>`;
                    cont.innerHTML = html;
                } catch(e) {
                    cont.innerHTML = `<div class="text-error" style="display:block;">Erro ao carregar auditoria.</div>`;
                }
            },
            openDeleteModal(taskId) {
                AppState.taskToDelete = taskId;
                document.getElementById('confirm-modal').classList.add('active');
            },
            closeModals() {
                document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active'));
            }
        };

        const TaskManager = {
            async loadTasks() {
                try {
                    const tasks = await API.fetch('/api/tasks');
                    AppState.tasks = tasks;
                    UI.renderBoard();
                } catch(e) {
                    Toast.show("Erro ao carregar tarefas", "error");
                }
            },
            async saveTask(e) {
                e.preventDefault();
                const id = document.getElementById('task-id').value;
                const data = {
                    title: document.getElementById('task-title').value,
                    description: document.getElementById('task-desc').value,
                    deadline: document.getElementById('task-deadline').value,
                    status: document.getElementById('task-status').value
                };
                try {
                    if(id) {
                        const updated = await API.fetch(`/api/tasks/${id}`, { method:'PUT', body:JSON.stringify(data) });
                        const idx = AppState.tasks.findIndex(t => t.id === id);
                        if(idx !== -1) AppState.tasks[idx] = updated;
                        Toast.show("Tarefa atualizada");
                    } else {
                        const created = await API.fetch('/api/tasks', { method:'POST', body:JSON.stringify(data) });
                        AppState.tasks.push(created);
                        Toast.show("Tarefa criada com sucesso");
                    }
                    UI.closeModals();
                    UI.renderBoard();
                } catch(err) { Toast.show(err.message, "error"); }
            },
            async moveTask(taskId, newStatus) {
                const task = AppState.tasks.find(t => t.id === taskId);
                if(!task || task.status === newStatus) return;
                const oldStatus = task.status;
                task.status = newStatus;
                UI.renderBoard(); // Optimistic
                try {
                    await API.fetch(`/api/tasks/${taskId}`, { method:'PUT', body:JSON.stringify({ status: newStatus }) });
                } catch(e) {
                    task.status = oldStatus; // Rollback
                    UI.renderBoard();
                    Toast.show("Erro ao mover tarefa", "error");
                }
            },
            async toggleComplete(taskId) {
                const task = AppState.tasks.find(t => t.id === taskId);
                if(!task) return;
                task.completed = !task.completed;
                UI.renderBoard(); // Optimistic
                try {
                    await API.fetch(`/api/tasks/${taskId}`, { method:'PUT', body:JSON.stringify({ completed: task.completed }) });
                } catch(e) {
                    task.completed = !task.completed; // Rollback
                    UI.renderBoard();
                    Toast.show("Erro ao atualizar", "error");
                }
            },
            async confirmDelete() {
                if(!AppState.taskToDelete) return;
                try {
                    await API.fetch(`/api/tasks/${AppState.taskToDelete}`, { method:'DELETE' });
                    AppState.tasks = AppState.tasks.filter(t => t.id !== AppState.taskToDelete);
                    UI.closeModals();
                    UI.renderBoard();
                    Toast.show("Tarefa excluída");
                } catch(e) { Toast.show("Erro ao excluir", "error"); }
            }
        };

        const AuthManager = {
            init() {
                document.getElementById('form-login').addEventListener('submit', async(e) => {
                    e.preventDefault();
                    const email = document.getElementById('login-email').value;
                    const pass = document.getElementById('login-password').value;
                    try {
                        const res = await API.fetch('/api/auth/login', { method:'POST', body:JSON.stringify({email, password:pass}) });
                        Storage.set('kanban_token', res.token);
                        App.setUser(res.user);
                        Toast.show("Login bem sucedido");
                    } catch(err) { Toast.show(err.message, "error"); }
                });

                document.getElementById('form-register').addEventListener('submit', async(e) => {
                    e.preventDefault();
                    const name = document.getElementById('reg-name').value;
                    const email = document.getElementById('reg-email').value;
                    const pass = document.getElementById('reg-password').value;
                    try {
                        await API.fetch('/api/auth/register', { method:'POST', body:JSON.stringify({name, email, password:pass}) });
                        Toast.show("Conta criada! Faça login.");
                        document.getElementById('btn-show-login').click();
                        document.getElementById('login-email').value = email;
                    } catch(err) { Toast.show(err.message, "error"); }
                });

                document.getElementById('btn-logout').addEventListener('click', () => App.logout());
            },
            async saveUserEdit(e) {
                e.preventDefault();
                const name = document.getElementById('edit-user-name').value;
                const email = document.getElementById('edit-user-email').value;
                const password = document.getElementById('edit-user-password').value;
                try {
                    const res = await API.fetch('/api/users/me', { method:'PUT', body:JSON.stringify({name, email, password}) });
                    Storage.set('kanban_token', res.token);
                    App.setUser(res.user);
                    UI.closeModals();
                    Toast.show("Perfil atualizado com sucesso");
                } catch(err) { Toast.show(err.message, "error"); }
            }
        };

        const App = {
            async init() {
                UI.init();
                AuthManager.init();
                
                const token = Storage.get('kanban_token');
                if (token) {
                    const decoded = CryptoUtils.decodeJWT(token);
                    if (decoded && decoded.exp > Date.now() / 1000) {
                        this.setUser({ id: decoded.userId, name: decoded.name, email: decoded.email });
                        return;
                    }
                }
                this.logout(null); // Clear invalid/expired token
            },
            setUser(user) {
                AppState.user = user;
                document.getElementById('user-name').textContent = user.name;
                document.getElementById('user-avatar').textContent = user.name.substring(0,2).toUpperCase();
                Router.showApp();
                TaskManager.loadTasks();
            },
            logout(msg) {
                Storage.remove('kanban_token');
                AppState.user = null;
                AppState.tasks = [];
                document.getElementById('form-login').reset();
                document.getElementById('form-register').reset();
                document.getElementById('btn-show-login').click();
                Router.showAuth();
                if(msg) Toast.show(msg, "error");
            }
        };

        // Start application
        document.addEventListener('DOMContentLoaded', () => App.init());
    </script>
</body>
</html>
